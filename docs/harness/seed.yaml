name: agent-first-docs-pipeline
goal: >
  Markdown을 single source of truth로 유지하면서 사람이 읽기 좋은 HTML 뷰어(mdBook)와
  1회성 HTML 산출물 격리 위치(artifacts/)를 함께 갖춘 에이전트 우선 문서 파이프라인 도입.
  HTML을 입력(SST)으로 쓰는 방향은 명시적으로 차단.

context:
  source: docs/brainstorming/html-vs-markdown-artifacts.md
  date_locked: 2026-05-21
  related_docs:
    - docs/brainstorming/html-vs-markdown-artifacts.md
    - rules/agent_routing.md
    - rules/change_control.md

scope:
  in_scope:
    - mdBook viewer 도입 (book.toml, mdbook-mermaid preprocessor, 빌드 스크립트)
    - rules/doc_standards.md 신설 (다이어그램·요약·표·HTML 격리 정책)
    - .claude/skills/design-mockup/ 스킬 신설 (slider/grid mockup 한정)
    - artifacts/ 디렉터리 + gitignore 정책
    - preview/ 트랙 보류 결정 기록
  out_of_scope:
    - 기존 MD 파일 일괄 마이그레이션 (표준은 신규 작성부터 적용)
    - HTML 기반 SST 어느 위치에서든
    - Storybook · shadcn · Next dev 환경 셋업
    - D2 · PlantUML 등 Mermaid 대체 다이어그램 툴
    - mdBook 외 SSG (Quarto, Hugo 등) 검토
    - CI 자동 배포 (GitHub Pages 등)
    - motion-design 스킬 (별도 백로그)
    - 커뮤니티 스킬 fork·설치 (별도 결정)

acceptance_criteria:
  - id: AC1-mdbook
    title: mdBook viewer 도입 (fresh-clone DX 포함)
    must:
      - book.toml이 repo 루트에 존재, 소스 경로는 docs/
      - docs/SUMMARY.md가 viewer 진입 인덱스로 동작
      - mdbook-mermaid preprocessor 등록 (book.toml)
      - scripts/docs-build.sh 한 줄로 빌드 가능
      - 빌드 산출물(book/)이 .gitignore에 등록
      - Fresh-clone DX (템플릿 레포 컨텍스트)
      - bootstrap 스킬에 docs 도구(mdbook, mdbook-mermaid, mmdc) 설치 phase 포함
      - scripts/docs-build.sh가 도구 부재 시 친절한 install 명령 출력 후 exit 1
      - Mermaid syntax 오류 시 빌드 실패. 검증 수단 ladder
        1) mdbook-mermaid strict 모드
        2) mdbook-mermaid-mmdr (server-side 렌더)
        3) 별도 mermaid-cli step (scripts/docs-build.sh 안에 포함)
        구현 시점에 1번 작동 확인. 실패 시 즉시 2번, 또 실패 시 3번으로 swap. AC1 verify가
        반드시 한 후보로 성립해야 함.
    should:
      - mdbook serve로 로컬 hot reload 가능
    verify:
      - bash scripts/docs-build.sh exit 0 후 book/ 생성 확인
      - book/ git status에 안 잡힘
      - 일부러 Mermaid 깨뜨리면 빌드 exit != 0 (위 ladder 중 작동하는 수단으로)

  - id: AC2-doc-standards
    title: rules/doc_standards.md 신설
    must:
      - rules/doc_standards.md 존재
      - CLAUDE.md의 "Linked Modules" 섹션에 링크 추가
      - 다음 5개 규칙 명시
      - 다이어그램은 Mermaid 기본, ASCII는 코드 코멘트 안 5-10줄 한정 허용
      - 긴 문서(대략 200줄+)는 상단 200자 요약 또는 TL;DR 강제. 200줄은 hard cap이 아닌
        trigger threshold — 외부 보고서 권장 "한 파일 ≤ 400줄"보다 보수적으로 잡음.
      - GFM 표 정렬 유지
      - 사람용 1회성 HTML은 artifacts/, docs/ 안에 두지 않음
      - 스킬 정의 파일은 대문자 SKILL.md (Linux silent failure 방지)
    should:
      - 표 정렬 자동화 hint 한 줄
    verify:
      - 파일 존재
      - CLAUDE.md grep으로 링크 확인
      - 5개 규칙 명시적 존재

  - id: AC3-design-mockup-skill
    title: design-mockup 스킬 신설
    sync_rationale: >
      design-mockup은 generic 도구 (slider/grid mockup, 프로젝트 토큰 없음). 본 repo가
      개인 운영 스킬의 source of truth이므로 .claude/skills/에 저자, ~/.claude/skills/에
      배포 사본. 둘 다 동일 내용이어야 함 (memory feedback_skill_sync.md 정책).
      추후 프로젝트별 specialization이 필요해지면 (iii) frontmatter는 동일하되 본문
      override 패턴으로 분기하는 별도 결정 필요. 본 PR에서는 분기 없음.
    must:
      - .claude/skills/design-mockup/SKILL.md 존재, frontmatter 정상
      - 산출물은 단일 HTML 파일 (slider/knob + copy to prompt 버튼)
      - 산출물 저장 위치는 artifacts/design/
      - HTML 보일러플레이트는 assets/에 둠 (컨텍스트 토큰 절약)
      - Non-Negotiables 섹션에 스코프 한정 명시 (mockup·파라미터 튜닝 전용)
      - 글로벌 ~/.claude/skills/design-mockup/에도 동일 sync (위 sync_rationale 참조)
    should:
      - 예시 프롬프트 2-3개 포함 (6-grid 비교, 단일 컴포넌트 파라미터 튜닝)
    verify:
      - 스킬 invoke 후 HTML 파일 생성
      - 브라우저에서 slider 동작 + copy 버튼 클립보드 복사 확인
      - 글로벌·로컬 SKILL.md diff 없음 (sync_rationale 전제)

  - id: AC4-artifacts-policy
    title: artifacts/ 디렉터리 정책
    must:
      - artifacts/ 디렉터리 존재 (README.md 포함)
      - .gitignore에 artifacts/* 등록하되 !artifacts/README.md와 !artifacts/*/README.md
        예외 라인 추가 (서브디렉터리 README도 추적되도록)
      - artifacts/README.md에 용도 한 단락 (사람용 1회성 HTML, mdBook viewer 미포함, gitignore 처리)
      - rules/doc_standards.md에서 cross-reference
      - 30일 retention 정책 및 cleanup 책임 명시 (사용자 manual cleanup, 자동화는 추후)
    should:
      - 누적 누락 통증 발생 시 cleanup 스크립트 검토 (백로그)
    verify:
      - 디렉터리 존재
      - gitignore 적용 (artifacts/foo.html 추적 안 됨, artifacts/foo/README.md 추적됨)
      - doc_standards.md에서 링크
      - artifacts/README.md에 retention 정책 한 줄 존재

  - id: AC5-preview-deferred
    title: preview/ 트랙 조건부 보류 (활성화 트리거 명시)
    must:
      - docs/brainstorming/html-vs-markdown-artifacts.md에 결정 단락 존재
      - 사유 명시 (Next dev/Storybook/shadcn 등 별 환경 결정)
      - 검토 후보 명시 (Next dev + Storybook MCP + shadcn registry)
      - 활성화 트리거 명시 (다음 중 하나라도 발생 시 별 결정 진입)
      - 동시 작업 중인 디자인 컴포넌트 5-10개 누적
      - artifacts/design/의 mockup HTML이 1회성이 아닌 반복 재참조 시작
      - 실시간 디자인 피드백 루프 통증이 design-mockup만으로 해결 안 됨
      - Claude Design 사용량 제한 실제 발생
    not:
      - 어떤 의존성·디렉터리·설정도 미리 깔지 않음
    verify:
      - brainstorming 문서에 보류 결정 + 4개 트리거 단락 존재

decisions:
  viewer_output_dir:
    value: book/
    reason: mdBook 도구 컨벤션. 미래 협업자·도구 호환에 유리. .omc/는 운영 상태 보관용.
  build_entrypoint:
    value: scripts/docs-build.sh
    reason: 현 repo에 scripts/ 폴더 존재(scripts/docs-drift). 추가 도구 의존성 0.
  design_mockup_output:
    value: artifacts/design/
    reason: 사람이 파일 탐색기에서 즉시 찾기 좋음. AC4 정책과 자연스럽게 통합.
  pr_unit:
    value: single
    reason: AC 항목 간 cross-reference 강함 (AC2가 AC4 참조, AC3이 AC4 참조).
      분할 시 PR 순서 강제·중간 상태 합리화 비용 발생. 변경 코드 복잡도 낮아 단일 review 부담 작음.

risks:
  - id: R1
    desc: Mermaid validator enforcement 도구 가용성 불확실 (mdbook-mermaid가 strict 모드를
      제공하지 않거나 mmdr/mermaid-cli가 환경에서 실패할 수 있음)
    mitigation: |
      AC1 ladder 순서대로 시도:
      1) mdbook-mermaid strict 모드 활성화 가능 여부 확인
      2) 불가 시 mdbook-mermaid-mmdr 설치·작동 확인
      3) 둘 다 불가 시 scripts/docs-build.sh 안에 mermaid-cli 별도 step 추가
      셋 다 실패 시 AC1 verify 미달 — must를 깰 수 없으므로 작업 중단·재설계.
  - id: R2
    desc: 글로벌·로컬 design-mockup SKILL.md sync 누락 가능
    mitigation: PR 체크리스트에 양쪽 sync 명시. 추후 sync 자동화는 백로그.
  - id: R3
    desc: 기존 placeholder 문서들(docs/harness/kickoff-summary.md 등)이 새 표준과 불일치
    mitigation: opportunistic 정리, 즉시 마이그레이션 안 함
  - id: R4
    desc: Mermaid 작성 모델 신뢰도 자체 한계 (MermaidSeqBench 7B-72B 오픈모델 기준
      activation handling 70-80%, error tracking 70%). 프론티어 모델은 더 나을 가능성이
      높으나 0이 아닌 실패율이 반복 빌드에서 retry 누적.
    mitigation: R1과 동일한 build-time validation gate로 잡음. validator가 fail하면
      에이전트가 즉시 재작성. 누적 retry rate가 높아지면 ASCII fallback 허용 범위
      재검토.
  - id: R5
    desc: artifacts/ retention 미강제. 6개월 후 비대해질 가능성, cleanup 책임 모호.
    mitigation: AC4에 retention 정책 한 줄 명시 (사용자 manual). 자동화는 통증
      누적 시 별 결정. 누적 임계는 디스크 사용량 또는 파일 수 100+ 정도를 신호로.
